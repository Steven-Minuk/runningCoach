deploy:
    name: Deploy to Azure Function
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into package folder
        run: |
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy via Azure CLI
        run: |
          zip -r deploy.zip . -x "*.git*" -x ".venv/*" -x "tests/*" -x "ai_coach/*" -x "__pycache__/*" -x "*.pyc"
          az functionapp deployment source config-zip \
            --name func-runningcoach-dev \
            --resource-group rg-ai-running-coach \
            --src deploy.zip

      - name: Restart Function App
        run: |
          sleep 30
          az functionapp restart --name func-runningcoach-dev --resource-group rg-ai-running-coach