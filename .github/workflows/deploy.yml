name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Azure Function
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-runningcoach-dev
          scm-do-build-during-deployment: true
          enable-oryx-build: true
          respect-funcignore: true
          package: .
      
      - name: Restart Function App
        run: |
          sleep 30
          az functionapp restart --name func-runningcoach-dev --resource-group rg-ai-running-coach
          sleep 60
          az functionapp show --name func-runningcoach-dev --resource-group rg-ai-running-coach --query "state" -o tsv